<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 1</title>
</head>

<body>





    <script>
        // let - позволяет создать переменные с блочной областью видимости. Например, если такую переменную создать внутри условного блока, то её значение будет доступно только в нутри этого блока. 
        // let - переменную объявленую через  let можно изменять
        // const - Если переменная объявлена через const, её значение измеенить нельзя. Правильно называть такие значения константами

        /**
        * строка (string)
        * число (number)
        * булевое значение (boolean)
        * undefined 
        * объект (object)
        * null
        * symbol
        * большое число  (BigInt)
        * typeof - Определяет, к какому типу данных относится значения
        * 
        * Строка - это текст заключенный в кавычки. Двойные и одинарные кавычки не имеют различия. Кроме того, строка может быть заключена в обратные кавычки.
        * 
        * Число - это число, целое или десятичное. Также сюда относятся число в двоичной, восмеричной и шестинадцатеричной системах счисления.
        * В JS для типа number установлено ограничения на максимальные значения от -(2 в 53 степени - 1) до (2 в 53 степени - 1)
        * В языке есть несколько специальных значений, которые определяются как число. То есть при вызове typeof мы для них получим “number”:
        *           NaN
        *           infinity, -infinitey
        * NaN возникает при ошибке вычисления и «поглощает» все другие арифметические операции, которые мы пытаемся производить над переменной. Возникает, когда движок не может получить результат математической операции, например когда один из операторов не число
        * Infinity — бесконечность.
        * -Infinity — это отрицательная бесконечность.
        * 
        * Булевое значение (логическое) значение может быть только правдивое (true) или ложное (false)
        * 
        * Undefined - это спецальный тип данных, который имеет одно-единственное значение undefined и автомотически присваевается вновь созданным, но не инициализированным другим значением переменным Также, если в функции не определён
        возврат какого-либо значения, она возвращает undefined.

        */


        let countClickButton = 2;
        countClickButton = countClickButton + 2;

        console.log(`Нажали на кнопку ${countClickButton + 5} раз`);




        console.log(typeof 2);
        console.log(typeof '2');
    </script>
</body>

</html>
